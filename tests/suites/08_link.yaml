# AQL v0.5 Test Suite - §08 LINK
# LINK covers cross-type edges, nonexistent source/target errors,
# and LINK FROM ALL error message.

suite: LINK
spec_section: "§9, §19"
total_tests: 6
bug_refs: [B14, B16]

tests:
  - id: T08-01
    name: "LINK SEMANTIC to PROCEDURAL"
    spec_ref: "§9 LINK SEMANTIC→PROCEDURAL"
    seed_required: [semantic-ai, $PROC_ID]
    query: |
      LINK FROM SEMANTIC WHERE concept = "ai_enterprise_content" TO PROCEDURAL WHERE pattern = "tech_news_premium" TYPE "triggers" WEIGHT 0.88
    expect:
      success: true
      affected_count: 1

  - id: T08-02
    name: "LINK PROCEDURAL to EPISODIC"
    spec_ref: "§9 LINK PROCEDURAL→EPISODIC"
    seed_required: [$PROC_ID, e-001]
    query: |
      LINK FROM PROCEDURAL WHERE pattern = "tech_news_premium" TO EPISODIC WHERE bid_id = "e-001" TYPE "applied_to" WEIGHT 0.95
    expect:
      success: true
      affected_count: 1

  - id: T08-03
    name: "LINK EPISODIC to EPISODIC same-type"
    spec_ref: "§9 LINK EPISODIC→EPISODIC same-type"
    seed_required: [e-001, e-003]
    query: |
      LINK FROM EPISODIC WHERE bid_id = "e-001" TO EPISODIC WHERE bid_id = "e-003" TYPE "recurring_pattern" WEIGHT 0.75
    expect:
      success: true
      affected_count: 1

  - id: T08-04
    name: "LINK nonexistent source (B16)"
    spec_ref: "B16 LINK nonexistent source"
    seed_required: [e-001]
    query: |
      LINK FROM EPISODIC WHERE bid_id = "ghost-999" TO EPISODIC WHERE bid_id = "e-001" TYPE "phantom" WEIGHT 0.5
    expect:
      success: false
      error_contains: "source"

  - id: T08-05
    name: "LINK nonexistent target (B16)"
    spec_ref: "B16 LINK nonexistent target"
    seed_required: [e-001]
    query: |
      LINK FROM EPISODIC WHERE bid_id = "e-001" TO EPISODIC WHERE bid_id = "ghost-target" TYPE "phantom" WEIGHT 0.5
    expect:
      success: false
      error_contains: "target"

  - id: T08-06
    name: "LINK FROM ALL error (B14)"
    spec_ref: "B14 LINK FROM ALL error"
    seed_required: []
    query: |
      LINK FROM ALL WHERE concept = "x" TO PROCEDURAL WHERE pattern = "y" TYPE "t"
    expect:
      success: false
      error_contains: "ALL"
